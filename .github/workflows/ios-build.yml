name: iOS — Build & Submit (TestFlight)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Distribution profile
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta

jobs:
  build:
    name: EAS Build & Submit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write App Store Connect API key
        run: echo "${{ secrets.ASC_API_KEY }}" > /tmp/asc_key.p8

      - name: Build and submit to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_PATH: /tmp/asc_key.p8
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive --auto-submit
